name: CI/CD Pipeline with Artifact Registry (WIF)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up JDK for Maven build
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Build Spring Boot app with Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Authenticate to GCP via Workload Identity Federation
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/832085079574/locations/global/workloadIdentityPools/githubpool/providers/github
          service_account: github@project-fd98a236-27cd-4be4-987.iam.gserviceaccount.com

      # Configure Docker for Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # Build Docker image
      - name: Build Docker image
        run: docker build -t us-central1-docker.pkg.dev/project-fd98a236-27cd-4be4-987/myspringbootrepo/springboot-hello:${{ github.sha }} .

      # Push Docker image
      - name: Push Docker image
        run: docker push us-central1-docker.pkg.dev/project-fd98a236-27cd-4be4-987/myspringbootrepo/springboot-hello:${{ github.sha }}

      # Install Helm via apt-get
      - name: Install Helm 3.12.0
        run: |
          curl -fsSL https://get.helm.sh/helm-v3.12.0-linux-amd64.tar.gz -o helm.tar.gz
          tar -zxvf helm.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/helm

      - name: Install Minikube
        run:
          curl -fsSL https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          sudo install minikube-linux-amd64 /usr/local/bin/minikube

      - name: Start Minikube
        run:
          minikube start --driver=docker
          kubectl cluster-info
          kubectl get nodes
      

        # Deploy with Helm
      - name: Helm upgrade/install
        run: helm upgrade --install springboot-hello ./helm/springboot-hello --set image.repository=us-central1-docker.pkg.dev/project-fd98a236-27cd-4be4-987/springboot-hello-repo/springboot-hello --set image.tag=${{ github.sha }}
